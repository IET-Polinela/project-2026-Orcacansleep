{% extends 'base.html' %}

{% block title %}Register | Silent Hill Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="page-title mb-2">Register</h1>
                <p class="page-subtitle mb-4">Buat akun citizen untuk melihat laporan kota.</p>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        {{ form.username }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        {{ form.email }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        {{ form.password1 }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Konfirmasi Password</label>
                        {{ form.password2 }}
                    </div>

                    <div class="d-flex flex-wrap gap-2">
                        <button type="submit" class="btn btn-blood">Register</button>
                        <a href="{% url 'login' %}" class="btn btn-outline-fog">Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

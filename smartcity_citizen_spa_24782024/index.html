<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Citizen Portal</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background-color: #f0f2f5;
        }

        .spa-container {
            min-height: calc(100vh - 80px);
        }

        /* Animasi halus saat kartu laporan muncul */
        .card-report {
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .card-report:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.10) !important;
        }

        /* Tebalkan teks progress bar supaya terbaca */
        .progress-bar {
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* Pastikan pagination tidak overflow */
        #paginationContainer .page-link {
            min-width: 36px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-buildings-fill me-2"></i>
                Silent Hill Citizen Portal
            </a>
            <div id="nav-menu" class="ms-auto"></div>
        </div>
    </nav>

    <!-- Konten Utama SPA -->
    <main class="container-fluid px-4 mt-4 spa-container" id="app-content">
    </main>


    <!-- =====================================================
         STEP 2 – Modal Form Laporan Warga
         Tombol "Simpan Draft" dan "Ajukan" menggunakan
         type="button" agar tidak memicu reload HTML default
         ===================================================== -->
    <div class="modal fade"
         id="reportModal"
         tabindex="-1"
         aria-labelledby="reportModalLabel"
         aria-hidden="true">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content shadow border-0">

                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="reportModalLabel">
                        <i class="bi bi-pencil-square me-2"></i>Form Laporan Warga
                    </h5>
                    <button type="button"
                            class="btn-close btn-close-white"
                            data-bs-dismiss="modal"
                            aria-label="Close">
                    </button>
                </div>

                <div class="modal-body p-4">

                    <!-- 1. Field-field form pengajuan laporan -->
                    <form id="reportForm">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-card-heading me-1"></i>Judul Laporan
                            </label>
                            <input type="text"
                                   id="reportTitle"
                                   class="form-control"
                                   placeholder="Contoh: Jalan berlubang di Jl. Merdeka"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-tag me-1"></i>Kategori
                            </label>
                            <select id="reportCategory" class="form-select">
                                <option value="Jalan Rusak">Jalan Rusak</option>
                                <option value="Drainase">Drainase</option>
                                <option value="Sampah">Sampah</option>
                                <option value="Lampu Jalan">Lampu Jalan</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-geo-alt me-1"></i>Lokasi
                            </label>
                            <input type="text"
                                   id="reportLocation"
                                   class="form-control"
                                   placeholder="Contoh: Jl. Merdeka No. 12, Silent Hill"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-text-paragraph me-1"></i>Deskripsi
                            </label>
                            <textarea id="reportDescription"
                                      rows="4"
                                      class="form-control"
                                      placeholder="Jelaskan kondisi yang dilaporkan secara detail..."
                                      required></textarea>
                        </div>

                    </form>

                </div>

                <!-- 2. Tombol aksi – type="button" supaya tidak trigger form submit HTML -->
                <div class="modal-footer">
                    <button type="button"
                            data-bs-dismiss="modal"
                            class="btn btn-outline-secondary">
                        <i class="bi bi-x me-1"></i>Batal
                    </button>
                    <button type="button"
                            id="btnDraft"
                            class="btn btn-secondary">
                        <i class="bi bi-floppy me-1"></i>Simpan Draft
                    </button>
                    <button type="button"
                            id="btnSubmit"
                            class="btn btn-primary">
                        <i class="bi bi-send-fill me-1"></i>Ajukan
                    </button>
                </div>

            </div>

        </div>

    </div>
    <!-- ===================================================== -->


    <!-- Urutan script: api → auth → app → router -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/router.js"></script>

    <!-- Bootstrap 5 Bundle JS (termasuk Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

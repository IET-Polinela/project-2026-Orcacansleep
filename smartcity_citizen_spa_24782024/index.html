<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent Hill Citizen Portal</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom Theme -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="sh-app">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#dashboard">
                <i class="bi bi-buildings-fill me-2"></i>
                Silent Hill Citizen Portal
            </a>

            <div id="nav-menu" class="ms-auto"></div>
        </div>
    </nav>

    <!-- Main SPA Content -->
    <main class="container-fluid px-4 mt-4 spa-container" id="app-content"></main>

    <!-- Modal Form Laporan -->
    <div class="modal fade"
         id="reportModal"
         tabindex="-1"
         aria-labelledby="reportModalLabel"
         aria-hidden="true">

        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow border-0">

                <div class="modal-header text-white">
                    <h5 class="modal-title" id="reportModalLabel">
                        <i class="bi bi-pencil-square me-2"></i>Form Laporan Warga
                    </h5>

                    <button type="button"
                            class="btn-close btn-close-white"
                            data-bs-dismiss="modal"
                            aria-label="Tutup">
                    </button>
                </div>

                <div class="modal-body p-4">
                    <form id="reportForm" autocomplete="off">

                        <div class="mb-3">
                            <label for="reportTitle" class="form-label fw-semibold">
                                <i class="bi bi-card-heading me-1"></i>Judul Laporan
                            </label>

                            <input type="text"
                                   id="reportTitle"
                                   class="form-control"
                                   maxlength="200"
                                   placeholder="Contoh: Jalan berlubang di Jl. Merdeka"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label for="reportCategory" class="form-label fw-semibold">
                                <i class="bi bi-tag me-1"></i>Kategori
                            </label>

                            <select id="reportCategory" class="form-select" required>
                                <option value="Jalan Rusak">Jalan Rusak</option>
                                <option value="Drainase">Drainase</option>
                                <option value="Sampah">Sampah</option>
                                <option value="Lampu Jalan">Lampu Jalan</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="reportLocation" class="form-label fw-semibold">
                                <i class="bi bi-geo-alt me-1"></i>Lokasi
                            </label>

                            <input type="text"
                                   id="reportLocation"
                                   class="form-control"
                                   maxlength="200"
                                   placeholder="Contoh: Jl. Merdeka No. 12, Silent Hill"
                                   required>
                        </div>

                        <div class="mb-1">
                            <label for="reportDescription" class="form-label fw-semibold">
                                <i class="bi bi-text-paragraph me-1"></i>Deskripsi
                            </label>

                            <textarea id="reportDescription"
                                      rows="4"
                                      class="form-control"
                                      placeholder="Jelaskan kondisi yang dilaporkan secara detail..."
                                      required></textarea>
                        </div>

                        <small class="text-muted">
                            Laporan berstatus draft masih dapat diedit sebelum diajukan.
                        </small>

                    </form>
                </div>

                <div class="modal-footer">
                    <button type="button"
                            data-bs-dismiss="modal"
                            class="btn btn-outline-secondary">
                        <i class="bi bi-x me-1"></i>Batal
                    </button>

                    <button type="button"
                            id="btnDraft"
                            class="btn btn-secondary">
                        <i class="bi bi-floppy me-1"></i>Simpan Draft
                    </button>

                    <button type="button"
                            id="btnSubmit"
                            class="btn btn-primary">
                        <i class="bi bi-send-fill me-1"></i>Ajukan
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="appToast"
             class="toast align-items-center border-0"
             role="alert"
             aria-live="assertive"
             aria-atomic="true">

            <div class="d-flex">
                <div class="toast-body" id="appToastMessage">
                    Pesan sistem.
                </div>

                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast"
                        aria-label="Tutup">
                </button>
            </div>
        </div>
    </div>

    <!-- TAMBAH FITUR 6: Scroll To Top Button -->
    <button
        type="button"
        id="scrollTopBtn"
        class="scroll-top-btn"
        aria-label="Kembali ke atas">
        <i class="bi bi-arrow-up"></i>
    </button>
    <!-- SELESAI FITUR 6 -->

    <!-- JavaScript -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>

    <!-- Bootstrap Bundle harus dimuat sebelum router.js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/router.js"></script>
    <script src="js/features.js"></script>

</body>
</html>

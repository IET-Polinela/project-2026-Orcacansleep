{% extends 'base.html' %}

{% block title %}Hapus Laporan | Silent Hill Portal{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'home' %}">Home</a></li>
        <li class="breadcrumb-item"><a href="{% url 'report_list' %}">Reports</a></li>
        <li class="breadcrumb-item active" aria-current="page">Hapus Laporan</li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body p-4 text-center">
                <div class="mb-3">
                    <i class="bi bi-exclamation-octagon-fill text-danger" style="font-size: 3rem;"></i>
                </div>

                <h1 class="page-title mb-3">Konfirmasi Hapus</h1>
                <p class="page-subtitle mb-4">
                    Apakah kamu yakin ingin menghapus laporan
                    <strong>{{ object.title }}</strong>?
                </p>

                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2 flex-wrap">
                        <a href="{% url 'report_list' %}" class="btn btn-outline-fog">Batal</a>
                        <button type="submit" class="btn btn-danger">Ya, Hapus</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
